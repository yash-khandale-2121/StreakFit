services:
  - type: web
    name: territory-run
    env: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: false
      - key: MONGODB_URI
        sync: false          # you set this manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a strong secret
      - key: CLIENT_URL
        sync: false          # set to your Render URL e.g. https://territory-run.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false          # paste your Google OAuth client ID
    healthCheckPath: /api/health
